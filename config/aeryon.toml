[application]
name = "aeryon"
environment = "development"

[logging]
level = "info"

[plugins]
enabled = true
autoload = false

[runtime]
shutdown_timeout_secs = 10
first_frame_timeout_ms = 2000

[api]
enabled = true
host = "127.0.0.1"
port = 8080
cors_origins = ["http://127.0.0.1:5173", "http://localhost:5173"]

[synthetic_sensor]
enabled = false
interval_ms = 100
samples_per_frame = 64
sample_rate_hz = 1000.0
primary_frequency_hz = 10.0
secondary_frequency_hz = 37.0
secondary_amplitude = 0.25
log_every_n_frames = 10

# Only one active development source at a time. To use CSI fixture replay:
# 1) set synthetic_sensor.enabled = false
# 2) set sensors.csi_replay.enabled = true
[sensors.csi_replay]
enabled = true
path = "datasets/fixtures/csi/synthetic_dev_v1.ndjson"
loop_playback = false
frame_interval_ms = 100
maximum_frames = 0

# Baseline CSI calibration (spatial unwrap → affine phase detrend → RMS normalize).
# Deterministic development sanitization — not hardware-specific calibration.
[calibration]
enabled = true
profile = "baseline-csi-v1"
queue_capacity = 64

[calibration.baseline_csi_v1.phase_unwrap]
enabled = true

[calibration.baseline_csi_v1.linear_phase_detrend]
enabled = true

[calibration.baseline_csi_v1.rms_amplitude_normalize]
enabled = true
epsilon = 1.0e-8

# Baseline temporal DSP (windowing → motion-energy proxy → Hann/FFT spectrum).
# Frequencies use capture timestamps, not replay wall-clock speed.
# backend = "rust" (default) or "cpp" when built with --features cpp-dsp.
[dsp]
enabled = true
profile = "baseline-dsp-v1"
backend = "rust"
queue_capacity = 64
window_size_frames = 16
hop_size_frames = 4
maximum_sequence_gap = 1
timestamp_jitter_tolerance = 0.10
